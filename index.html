<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - Manajemen Tugas & Jadwal Akademik</title>
  <!-- SEO Meta Tags -->
  <meta name="description"
    content="StudyFlow - Sistem Informasi Manajemen Tugas dan Jadwal Mahasiswa modern. Gabungan Google Classroom sederhana, To-Do List, dan Planner Akademik.">
  <meta name="author" content="StudyFlow Team">

  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS is avoided per guidelines, using custom Vanilla CSS stylesheets instead -->
  <link rel="stylesheet" href="src/css/variables.css">
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/dashboard.css">
  <link rel="stylesheet" href="src/css/tasks.css">
  <link rel="stylesheet" href="src/css/calendar.css">
  <link rel="stylesheet" href="src/css/stats.css">
  <link rel="stylesheet" href="src/css/profile.css">

  <!-- Lucide Icons for premium modern iconography -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Chart.js for beautiful productivity analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- Main App Layout (shown when user is logged in) -->
  <div id="app-container" class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <i data-lucide="graduation-cap"></i>
        </div>
        <span class="brand-name">Study<span>Flow</span></span>
      </div>

      <div class="sidebar-user">
        <div class="sidebar-avatar-wrapper">
          <img id="sidebar-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=student" alt="User Avatar"
            class="sidebar-avatar">
          <span class="status-indicator online"></span>
        </div>
        <div class="sidebar-user-info">
          <h4 id="sidebar-user-name" class="user-name">Nama Mahasiswa</h4>
          <span id="sidebar-user-role" class="user-role">Mahasiswa</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="#dashboard" class="nav-link active" id="nav-dashboard">
              <i data-lucide="layout-dashboard"></i>
              <span>Dashboard</span>
            </a>
          </li>

          <!-- Admin Student Selector -->
          <li id="sidebar-admin-widget" class="hidden" style="position: relative;">
            <div class="sidebar-student-select-box">
              <i data-lucide="users"></i>
              <span id="global-student-select-text">-- Pilih Mahasiswa --</span>
              <i data-lucide="chevron-down" style="margin-left: auto; width: 16px; height: 16px;"></i>
              <select id="global-student-select">
                <option value="">-- Pilih Mahasiswa --</option>
              </select>
            </div>
          </li>

          <li class="student-dependent-menu">
            <a href="#tasks" class="nav-link" id="nav-tasks">
              <i data-lucide="check-square"></i>
              <span>Manajemen Tugas</span>
            </a>
          </li>
          <li class="student-dependent-menu">
            <a href="#calendar" class="nav-link" id="nav-calendar">
              <i data-lucide="calendar"></i>
              <span>Kalender Akademik</span>
            </a>
          </li>
          <li class="student-dependent-menu">
            <a href="#stats" class="nav-link" id="nav-stats">
              <i data-lucide="bar-chart-2"></i>
              <span>Statistik</span>
            </a>
          </li>
          <li>
            <a href="#profile" class="nav-link" id="nav-profile">
              <i data-lucide="user"></i>
              <span>Profil Saya</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button id="logout-btn" class="logout-btn">
          <i data-lucide="log-out"></i>
          <span>Keluar</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="sidebar-toggle-btn">
            <i data-lucide="menu"></i>
          </button>
          <div class="header-greeting">
            <h1 id="page-title">Dashboard</h1>
            <p id="page-subtitle" class="text-muted">Selamat datang kembali di StudyFlow!</p>
          </div>
        </div>

        <div class="header-right">
          <!-- Dark/Light Mode Switcher -->
          <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Dark/Light Mode">
            <i data-lucide="sun" class="sun-icon"></i>
            <i data-lucide="moon" class="moon-icon"></i>
          </button>

          <!-- Notification Dropdown -->
          <div class="notification-dropdown-wrapper">
            <button id="notification-btn" class="notification-btn" title="Reminders">
              <i data-lucide="bell"></i>
              <span id="notification-badge" class="badge hidden">0</span>
            </button>
            <div id="notification-menu" class="notification-menu hidden">
              <div class="notification-header">
                <h3>Notifikasi & Reminder</h3>
                <button id="clear-notifications" class="clear-btn">Bersihkan</button>
              </div>
              <div id="notification-list" class="notification-list">
                <!-- Notifications injected here -->
                <div class="no-notifications">Tidak ada pengingat baru.</div>
              </div>
            </div>
          </div>

          <!-- Quick User Widget -->
          <div class="header-user-widget" id="header-profile-trigger">
            <img id="header-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=student" alt="User Profile"
              class="header-avatar">
          </div>
        </div>
      </header>

      <!-- View Wrapper -->
      <div class="view-container" id="view-container">
        <!-- Views will be loaded dynamically via routing -->
      </div>
    </main>
  </div>

  <!-- Global Modal System -->
  <div id="modal-container" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Edit Tugas</h3>
        <button id="modal-close-btn" class="modal-close-btn">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Toast Notification System -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Bootstrapping Script -->
  <script type="module" src="src/js/app.js"></script>
</body>

</html>
